name: Deploy to Cloudflare

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    name: Deploy
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Install dependencies
        run: npm ci

      - name: Build project
        run: npm run build

      - name: Inject KV Namespace ID
        run: |
          if [ -z "${{ secrets.CONVERSATION_KV_ID }}" ]; then
            echo "ERROR: CONVERSATION_KV_ID secret is not set!"
            exit 1
          fi
          echo "Injecting KV Namespace ID: ${{ secrets.CONVERSATION_KV_ID }}"
          sed -i 's/\"id\": \"conversation_history\"/\"id\": \"${{ secrets.CONVERSATION_KV_ID }}\"/g' wrangler.jsonc
          echo "KV Namespace ID injected"
          echo "Updated configuration:"
          cat wrangler.jsonc | grep -A5 "kv_namespaces"

      - name: Deploy to Cloudflare
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_KEY }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: deploy
          secrets: |
            DASHSCOPE_API_KEY
            MOLTBOT_GATEWAY_TOKEN
            CF_ACCESS_TEAM_DOMAIN
            CF_ACCESS_AUD
            R2_ACCESS_KEY_ID
            R2_SECRET_ACCESS_KEY
            CF_ACCOUNT_ID
            FEISHU_APP_ID
            FEISHU_APP_SECRET
            FEISHU_VERIFICATION_TOKEN
        env:
          DASHSCOPE_API_KEY: ${{ secrets.DASHSCOPE_API_KEY }}
          MOLTBOT_GATEWAY_TOKEN: ${{ secrets.MOLTBOT_GATEWAY_TOKEN }}
          CF_ACCESS_TEAM_DOMAIN: ${{ secrets.CF_ACCESS_TEAM_DOMAIN }}
          CF_ACCESS_AUD: ${{ secrets.CF_ACCESS_AUD }}
          R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          CF_ACCOUNT_ID: ${{ secrets.CF_ACCOUNT_ID }}
          FEISHU_APP_ID: ${{ secrets.FEISHU_APP_ID }}
          FEISHU_APP_SECRET: ${{ secrets.FEISHU_APP_SECRET }}
          FEISHU_VERIFICATION_TOKEN: ${{ secrets.FEISHU_VERIFICATION_TOKEN }}
          DOCKER_USERNAME: ${{ secrets.DOCKER_USERNAME }}
          DOCKER_PASSWORD: ${{ secrets.DOCKER_PASSWORD }}
